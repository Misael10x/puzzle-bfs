<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Puzzle BFS/title>

<style>

body{
background:#050505;
color:#00ff9c;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
padding:40px;
border:2px solid #00ff9c;
border-radius:10px;
box-shadow:0 0 10px #00ff9c,0 0 40px #00ff9c;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
background:#111;
border:none;
color:#00ff9c;
border-bottom:2px solid #00ff9c;
}

button{
padding:10px 20px;
margin-left:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

button:hover{
background:#00cc7a;
}

.paso{
margin-top:20px;
}

.puzzle{
display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;
justify-content:center;
margin-top:10px;
}

.celda{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #00ff9c;
box-shadow:0 0 10px #00ff9c;
font-size:22px;
}

</style>

</head>

<body>

<div class="container">

<h1>Puzzle BFS Solver</h1>

<input id="estado" type="text" placeholder="Ejemplo: 4,2,3,1">

<button onclick="resolver()">Resolver</button>

<div id="resultado"></div>

</div>

<script>

async function resolver(){

let estado = document.getElementById("estado").value

if(!estado){
alert("Ingresa un estado ejemplo: 4,2,3,1")
return
}

let res = await fetch("/resolver",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({estado:estado})
})

let data = await res.json()

let contenedor = document.getElementById("resultado")
contenedor.innerHTML=""

data.forEach((paso,i)=>{

let bloque = document.createElement("div")
bloque.className="paso"

let titulo = document.createElement("div")
titulo.innerHTML="<b>Paso "+i+"</b>"

let puzzle = document.createElement("div")
puzzle.className="puzzle"

paso.forEach(num=>{
let celda = document.createElement("div")
celda.className="celda"
celda.innerText=num
puzzle.appendChild(celda)
})

bloque.appendChild(titulo)
bloque.appendChild(puzzle)

contenedor.appendChild(bloque)

})

}

</script>

</body>
</html>
