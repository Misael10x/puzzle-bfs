<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Vuelos BFS</title>

<style>

body{
background:#050505;
color:#00ff9c;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
padding:40px;
border:2px solid #00ff9c;
border-radius:10px;
box-shadow:0 0 10px #00ff9c,0 0 40px #00ff9c;
text-align:center;
width:300px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
background:#111;
border:none;
color:#00ff9c;
border-bottom:2px solid #00ff9c;
width:80%;
}

button{
padding:10px 20px;
margin-top:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

button:hover{
background:#00cc7a;
}

.resultado{
margin-top:20px;
}

.ruta{
margin-top:10px;
font-size:18px;
color:#00ffff;
}

</style>

</head>

<body>

<div class="container">

<h1>Vuelos BFS</h1>

<input id="inicio" type="text" placeholder="Origen (CDMX)">
<input id="destino" type="text" placeholder="Destino (Cancun)">

<button onclick="buscar()">Buscar Ruta</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

async function buscar(){

let inicio = document.getElementById("inicio").value.trim()
let destino = document.getElementById("destino").value.trim()

if(!inicio || !destino){
alert("Completa ambos campos")
return
}

let res = await fetch("/buscar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({inicio:inicio, destino:destino})
})

let data = await res.json()

let contenedor = document.getElementById("resultado")

if(data.error){
contenedor.innerHTML = "<p>"+data.error+"</p>"
return
}

contenedor.innerHTML = `
<p><b>Origen:</b> ${data.inicio}</p>
<p><b>Destino:</b> ${data.destino}</p>
<div class="ruta">Ruta: ${data.ruta.join(" → ")}</div>
`

}

</script>

</body>
</html>
