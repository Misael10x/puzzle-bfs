<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Puzzle BFS</title>

<style>

body{
background:#020202;
color:#00ff9c;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{

text-align:center;
padding:40px;
border:2px solid #00ff9c;
border-radius:10px;

box-shadow:
0 0 10px #00ff9c,
0 0 40px #00ff9c;

}

h1{

text-shadow:
0 0 10px #00ff9c,
0 0 20px #00ff9c;

}

input{

padding:10px;
background:#111;
border:none;
color:#00ff9c;
border-bottom:2px solid #00ff9c;

}

button{

padding:10px 20px;
margin-left:10px;
background:#00ff9c;
border:none;
cursor:pointer;

box-shadow:
0 0 10px #00ff9c,
0 0 20px #00ff9c;

}

button:hover{

background:#00cc7a;

}

.puzzle{

display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;
justify-content:center;
margin-top:30px;

}

.celda{

width:60px;
height:60px;

display:flex;
justify-content:center;
align-items:center;

border:2px solid #00ff9c;

font-size:22px;

box-shadow:
0 0 10px #00ff9c;

}

.info{

margin-top:20px;
font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>Puzzle BFS Solver</h1>

<input id="estado" placeholder="Ejemplo: 4,2,3,1">

<button onclick="resolver()">Resolver</button>

<div class="info" id="paso"></div>

<div id="puzzle" class="puzzle"></div>

</div>

<script>

async function resolver(){

let estado = document.getElementById("estado").value

let res = await fetch("/resolver",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({estado:estado})

})

let data = await res.json()

animar(data)

}

function dibujar(tablero){

let puzzle = document.getElementById("puzzle")

puzzle.innerHTML=""

tablero.forEach(num=>{

let celda = document.createElement("div")

celda.className="celda"

celda.innerText=num

puzzle.appendChild(celda)

})

}

function animar(pasos){

let i=0

let intervalo = setInterval(()=>{

if(i>=pasos.length){

clearInterval(intervalo)

return

}

document.getElementById("paso").innerText="Paso "+i

dibujar(pasos[i])

i++

},800)

}

</script>

</body>
</html>
